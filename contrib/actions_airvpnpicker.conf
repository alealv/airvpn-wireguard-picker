# OPNsense configd action for airvpn-wireguard-picker.
#
# Install to:
#   /usr/local/opnsense/service/conf/actions.d/actions_airvpnpicker.conf
#
# After installing, reload configd so it discovers the new action:
#   service configd restart
#
# Then test it from the OPNsense shell:
#   configctl airvpnpicker run
#
# Once that works, schedule it from the OPNsense GUI under
# System > Settings > Cron, picking "AirVPN Picker: pick fastest server"
# from the dropdown and the desired interval (e.g. */30 * * * *).
#
# All flags below are tunable — edit this file in-place or template it
# from your config management system. The script reads no config of its
# own, every knob is a CLI flag.

[run]
command:/usr/local/bin/airvpn-picker --interface wg2 --peer-pubkey REPLACE_WITH_PUBKEY --allowed-continents Europe --max-load 80 --hysteresis-pp 15
parameters:
type:script
message:running AirVPN picker
description:AirVPN Picker: pick fastest server
